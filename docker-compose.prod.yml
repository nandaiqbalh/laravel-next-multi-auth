services:
  postgres:
    image: postgres:16-alpine
    container_name: fullstack_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laravel_backend_prod
    restart: always
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: http://localhost:${BACKEND_PORT:-8000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SANCTUM_STATEFUL_DOMAINS: localhost:${FRONTEND_PORT:-3000}
    volumes:
      - ./.env:/var/www/html/.env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: next_frontend_prod
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:${FRONTEND_PORT:-3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}/api
      API_BASE_URL_INTERNAL: http://backend:8000/api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data_prod:
