services:
  postgres:
    image: postgres:16-alpine
    container_name: fullstack_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laravel_backend_dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:${BACKEND_PORT:-8000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SANCTUM_STATEFUL_DOMAINS: localhost:${FRONTEND_PORT:-3000}
    volumes:
      - ./backend:/var/www/html
      - ./.env:/var/www/html/.env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "composer install && php artisan migrate --seed --force && php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    image: node:22-alpine
    container_name: next_frontend_dev
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    env_file:
      - .env
    environment:
      NEXTAUTH_URL: http://localhost:${FRONTEND_PORT:-3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}/api
      API_BASE_URL_INTERNAL: http://backend:8000/api
    volumes:
      - ./frontend:/app
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data_dev:
